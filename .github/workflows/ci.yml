name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy opencv-python pillow scikit-image imutils matplotlib pylint wx

    - name: Install project
      run: |
        python -m pip install .

    - name: Run linter
      run: |
        pylint --rcfile=pylintrc --fail-under=9 src/voccultation

    - name: Run tests
      run: |
        PYTHONPATH=src python -m pytest tests/ -v
