name: Windows Artifact

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller pillow scikit-image imutils opencv-python numpy matplotlib wxpython

    - name: Install project
      run: |
        python -m pip install --no-deps .

    - name: Build with PyInstaller
      run: |
        pyinstaller --copy-metadata imageio --windowed --name voccultation src/voccultation/__main__.py

    - name: Zip artifact
      run: |
        Compress-Archive -Path dist\voccultation\* -DestinationPath voccultation-windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: voccultation-windows
        path: voccultation-windows.zip
        retention-days: 30
